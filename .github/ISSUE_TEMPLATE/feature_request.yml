name: Feature request
description: Suggest a new capability or repository improvement for Lime
labels:
  - enhancement
body:
  - type: input
    id: horizon
    attributes:
      label: Target horizon
      description: "Which horizon does this primarily affect: H0, H1, H2, H3, H4, or H5?"
  - type: textarea
    id: problem
    attributes:
      label: Problem statement
      description: What gap should this solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe the expected architecture, repository surface, or future behavior.
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Context
      description: Relevant MVP boundary, GitHub publication requirement, or runtime implication.
